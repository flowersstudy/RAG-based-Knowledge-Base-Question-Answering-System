services:
  - type: web
    name: rag-knowledge-base
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install pdfplumber
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: OPENAI_API_KEY
        sync: false  # 在 Render 控制台手动设置
      - key: OPENAI_BASE_URL
        sync: false
      - key: LLM_MODEL
        value: moonshot-v1-8k
    disk:
      name: chroma-data
      mountPath: /app/chroma_db
      sizeGB: 1
