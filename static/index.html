<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识库问答系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        * {
            font-family: 'Noto Sans SC', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .chat-message {
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing-dot {
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .source-card {
            transition: all 0.2s ease;
        }

        .source-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <!-- 头部 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">
                <i class="fas fa-brain mr-3"></i>RAG 知识库问答系统
            </h1>
            <p class="text-white/80">基于检索增强生成的智能问答助手</p>
            <div id="stats" class="inline-block mt-4 px-4 py-2 bg-white/20 rounded-full text-white text-sm">
                <i class="fas fa-database mr-2"></i>
                知识库文档: <span id="docCount">0</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧：上传和知识库管理 -->
            <div class="lg:col-span-1">
                <!-- 文件上传 -->
                <div class="glass rounded-2xl p-6 mb-6 shadow-xl">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">
                        <i class="fas fa-upload mr-2 text-purple-600"></i>上传文档
                    </h2>

                    <div id="dropZone"
                         class="border-2 border-dashed border-purple-300 rounded-xl p-8 text-center cursor-pointer transition-all hover:border-purple-500 hover:bg-purple-50">
                        <i class="fas fa-cloud-upload-alt text-4xl text-purple-400 mb-3"></i>
                        <p class="text-gray-600 mb-2">拖拽文件到此处或点击上传</p>
                        <p class="text-sm text-gray-400">支持 PDF、Word、TXT、Markdown</p>
                        <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx,.doc,.txt,.md,.markdown">
                    </div>

                    <div id="uploadProgress" class="hidden mt-4">
                        <div class="flex items-center justify-between text-sm text-gray-600 mb-1">
                            <span id="uploadStatus">正在上传...</span>
                            <span id="uploadPercent">0%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div id="progressBar" class="bg-purple-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>

                    <div id="uploadResult" class="hidden mt-3 p-3 rounded-lg text-sm"></div>
                </div>

                <!-- 已上传文档 -->
                <div class="glass rounded-2xl p-6 shadow-xl mb-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">
                        <i class="fas fa-file-alt mr-2 text-purple-600"></i>已上传文档
                    </h2>
                    <div id="documentList" class="space-y-2 max-h-48 overflow-y-auto">
                        <p class="text-sm text-gray-400">暂无文档</p>
                    </div>
                </div>

                <!-- 知识库管理 -->
                <div class="glass rounded-2xl p-6 shadow-xl">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">
                        <i class="fas fa-cog mr-2 text-purple-600"></i>知识库管理
                    </h2>

                    <button onclick="clearKnowledgeBase()"
                            class="w-full py-2 px-4 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors border border-red-200">
                        <i class="fas fa-trash-alt mr-2"></i>清空知识库
                    </button>

                    <div class="mt-4 text-sm text-gray-500">
                        <p class="mb-2"><i class="fas fa-info-circle mr-1"></i> 使用说明：</p>
                        <ul class="list-disc list-inside space-y-1 ml-2">
                            <li>上传文档后自动分片处理</li>
                            <li>支持多个文档混合检索</li>
                            <li>问答时会显示参考来源</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 右侧：问答界面 -->
            <div class="lg:col-span-2">
                <div class="glass rounded-2xl shadow-xl h-[700px] flex flex-col">
                    <!-- 聊天记录 -->
                    <div id="chatContainer" class="flex-1 overflow-y-auto p-6 space-y-4">
                        <!-- 欢迎消息 -->
                        <div class="chat-message flex items-start">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-white flex-shrink-0">
                                <i class="fas fa-robot"></i>
                            </div>
                            <div class="ml-3 bg-white rounded-2xl rounded-tl-none px-5 py-3 shadow-sm max-w-[80%]">
                                <p class="text-gray-700">你好！我是 RAG 知识库问答助手。请先上传文档，然后向我提问。我会基于你上传的资料为你解答。</p>
                            </div>
                        </div>
                    </div>

                    <!-- 输入区域 -->
                    <div class="p-4 border-t border-gray-100">
                        <div class="flex gap-3">
                            <input type="text" id="questionInput"
                                   placeholder="请输入你的问题..."
                                   class="flex-1 px-5 py-3 border border-gray-200 rounded-full focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all"
                                   onkeypress="if(event.key==='Enter') sendQuestion()">
                            <button onclick="sendQuestion()"
                                    id="sendBtn"
                                    class="px-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-full hover:shadow-lg hover:scale-105 transition-all">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>

                        <!-- 选项 -->
                        <div class="flex items-center justify-between mt-3 px-2">
                            <label class="flex items-center text-sm text-gray-500 cursor-pointer">
                                <input type="checkbox" id="streamToggle" checked class="mr-2 accent-purple-600">
                                流式输出
                            </label>
                            <span class="text-xs text-gray-400">按 Enter 发送</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';

        // 获取统计信息
        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/stats`);
                const data = await res.json();
                document.getElementById('docCount').textContent = data.total_documents;
            } catch (e) {
                console.error('获取统计失败:', e);
            }
        }

        // 加载文档列表
        async function loadDocuments() {
            try {
                const res = await fetch(`${API_BASE}/api/documents`);
                const data = await res.json();
                const listDiv = document.getElementById('documentList');

                if (!data.documents || data.documents.length === 0) {
                    listDiv.innerHTML = '<p class="text-sm text-gray-400">暂无文档</p>';
                    return;
                }

                listDiv.innerHTML = data.documents.map(doc => `
                    <div class="flex items-center justify-between p-2 bg-gray-50 rounded-lg">
                        <div class="flex items-center min-w-0">
                            <i class="fas fa-file text-purple-400 mr-2"></i>
                            <span class="text-sm text-gray-700 truncate" title="${doc.filename}">${doc.filename}</span>
                        </div>
                        <span class="text-xs text-gray-400 ml-2 flex-shrink-0">${doc.chunks} 片段</span>
                    </div>
                `).join('');
            } catch (e) {
                console.error('获取文档列表失败:', e);
                document.getElementById('documentList').innerHTML =
                    '<p class="text-sm text-red-400">加载失败</p>';
            }
        }

        // 文件上传
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-purple-500', 'bg-purple-50');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-purple-500', 'bg-purple-50');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-purple-500', 'bg-purple-50');
            const files = e.dataTransfer.files;
            if (files.length > 0) uploadFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) uploadFile(e.target.files[0]);
        });

        async function uploadFile(file) {
            const progressDiv = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('progressBar');
            const uploadPercent = document.getElementById('uploadPercent');
            const uploadStatus = document.getElementById('uploadStatus');
            const resultDiv = document.getElementById('uploadResult');

            progressDiv.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            progressBar.style.width = '0%';
            uploadPercent.textContent = '0%';

            const formData = new FormData();
            formData.append('file', file);

            // 模拟进度
            let progress = 0;
            const progressInterval = setInterval(() => {
                if (progress < 90) {
                    progress += 10;
                    progressBar.style.width = progress + '%';
                    uploadPercent.textContent = progress + '%';
                }
            }, 200);

            try {
                const res = await fetch(`${API_BASE}/api/upload`, {
                    method: 'POST',
                    body: formData
                });

                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                uploadPercent.textContent = '100%';

                const data = await res.json();

                setTimeout(() => {
                    progressDiv.classList.add('hidden');
                    resultDiv.classList.remove('hidden');

                    if (data.success) {
                        resultDiv.className = 'mt-3 p-3 rounded-lg text-sm bg-green-50 text-green-700 border border-green-200';
                        resultDiv.innerHTML = `<i class="fas fa-check-circle mr-1"></i> ${data.message}（已处理 ${data.chunks_added} 个片段）`;
                        loadStats();
                        loadDocuments();
                    } else {
                        resultDiv.className = 'mt-3 p-3 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200';
                        resultDiv.innerHTML = `<i class="fas fa-exclamation-circle mr-1"></i> 上传失败`;
                    }
                }, 500);

            } catch (e) {
                clearInterval(progressInterval);
                progressDiv.classList.add('hidden');
                resultDiv.classList.remove('hidden');
                resultDiv.className = 'mt-3 p-3 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200';
                resultDiv.innerHTML = `<i class="fas fa-exclamation-circle mr-1"></i> 上传失败: ${e.message}`;
            }
        }

        // 发送问题
        async function sendQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            const useStream = document.getElementById('streamToggle').checked;

            // 添加用户消息
            addUserMessage(question);
            input.value = '';

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                if (useStream) {
                    await sendStreamQuestion(question);
                } else {
                    await sendNormalQuestion(question);
                }
            } catch (e) {
                console.error('Full error:', e);
                let errorMsg = '抱歉，请求失败';
                if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
                    errorMsg = '抱歉，网络连接失败。请检查：\n1. 后端服务是否正常运行\n2. 防火墙是否关闭\n3. 刷新页面重试';
                } else {
                    errorMsg = '抱歉，请求失败: ' + e.message;
                }
                addBotMessage(errorMsg);
            } finally {
                sendBtn.disabled = false;
            }
        }

        async function sendNormalQuestion(question) {
            try {
                const res = await fetch(`${API_BASE}/api/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, top_k: 5 })
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(`HTTP ${res.status}: ${errorData.detail || 'Unknown error'}`);
                }

                const data = await res.json();

                // 添加回答和来源
                addBotMessage(data.answer, data.sources);
            } catch (e) {
                console.error('Request failed:', e);
                throw e;
            }
        }

        async function sendStreamQuestion(question) {
            // 添加一个空的助手消息用于流式输出
            const messageId = addBotMessage('', [], true);
            const contentDiv = document.getElementById(`content-${messageId}`);

            const res = await fetch(`${API_BASE}/api/query/stream`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, top_k: 5 })
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let fullContent = '';
            let sources = [];

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));

                            if (data.type === 'sources') {
                                sources = data.data;
                            } else if (data.type === 'content') {
                                fullContent += data.data;
                                contentDiv.innerHTML = formatContent(fullContent);
                                scrollToBottom();
                            } else if (data.type === 'done') {
                                // 流结束，添加来源
                                addSourcesToMessage(messageId, sources);
                            }
                        } catch (e) {
                            // 忽略解析错误
                        }
                    }
                }
            }
        }

        // 添加用户消息
        function addUserMessage(content) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'chat-message flex items-start justify-end';
            div.innerHTML = `
                <div class="mr-3 bg-purple-600 text-white rounded-2xl rounded-tr-none px-5 py-3 shadow-sm max-w-[80%]">
                    <p>${escapeHtml(content)}</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center text-white flex-shrink-0">
                    <i class="fas fa-user"></i>
                </div>
            `;
            container.appendChild(div);
            scrollToBottom();
        }

        // 添加助手消息
        function addBotMessage(content, sources = [], isStreaming = false) {
            const container = document.getElementById('chatContainer');
            const messageId = Date.now();
            const div = document.createElement('div');
            div.className = 'chat-message flex items-start';
            div.id = `msg-${messageId}`;

            let sourcesHtml = '';
            if (sources && sources.length > 0 && !isStreaming) {
                sourcesHtml = generateSourcesHtml(sources);
            }

            div.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-white flex-shrink-0">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="ml-3 flex-1 max-w-[80%]">
                    <div class="bg-white rounded-2xl rounded-tl-none px-5 py-3 shadow-sm">
                        <div id="content-${messageId}" class="text-gray-700 prose prose-sm max-w-none">
                            ${isStreaming ? '' : formatContent(content)}
                        </div>
                        ${isStreaming ? '<div class="typing-indicator mt-2"><span class="typing-dot inline-block w-2 h-2 bg-gray-400 rounded-full"></span><span class="typing-dot inline-block w-2 h-2 bg-gray-400 rounded-full ml-1"></span><span class="typing-dot inline-block w-2 h-2 bg-gray-400 rounded-full ml-1"></span></div>' : ''}
                    </div>
                    ${sourcesHtml}
                </div>
            `;

            container.appendChild(div);
            scrollToBottom();
            return messageId;
        }

        // 生成来源 HTML
        function generateSourcesHtml(sources) {
            if (!sources || sources.length === 0) return '';

            const items = sources.map((s, i) => `
                <div class="source-card bg-gray-50 rounded-lg p-3 border border-gray-200 cursor-pointer" onclick="this.classList.toggle('bg-purple-50')">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs font-medium text-purple-600">[文档${i+1}] ${s.source}</span>
                        <span class="text-xs text-gray-400">相似度: ${(s.similarity * 100).toFixed(1)}%</span>
                    </div>
                    <p class="text-xs text-gray-600 line-clamp-3">${escapeHtml(s.content)}</p>
                </div>
            `).join('');

            return `
                <div class="mt-3">
                    <p class="text-xs text-gray-500 mb-2"><i class="fas fa-bookmark mr-1"></i> 参考来源:</p>
                    <div class="grid grid-cols-1 gap-2">${items}</div>
                </div>
            `;
        }

        // 向流式消息添加来源
        function addSourcesToMessage(messageId, sources) {
            const msgDiv = document.getElementById(`msg-${messageId}`);
            if (!msgDiv || !sources || sources.length === 0) return;

            const contentDiv = msgDiv.querySelector('.flex-1');
            const existingSources = contentDiv.querySelector('.mt-3');
            if (existingSources) existingSources.remove();

            const sourcesHtml = generateSourcesHtml(sources);
            contentDiv.insertAdjacentHTML('beforeend', sourcesHtml);
        }

        // 格式化内容
        function formatContent(content) {
            // 简单的 markdown 格式化
            return escapeHtml(content)
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`(.+?)`/g, '<code class="bg-gray-100 px-1 rounded">$1</code>')
                .replace(/\n/g, '<br>');
        }

        // 转义 HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        // 清空知识库
        async function clearKnowledgeBase() {
            if (!confirm('确定要清空知识库吗？所有已上传的文档将被删除。')) return;

            try {
                const res = await fetch(`${API_BASE}/api/clear`, { method: 'DELETE' });
                const data = await res.json();

                if (data.success) {
                    alert('知识库已清空');
                    loadStats();
                    loadDocuments();
                }
            } catch (e) {
                alert('清空失败: ' + e.message);
            }
        }

        // 初始化
        loadStats();
        loadDocuments();
    </script>
</body>
</html>
